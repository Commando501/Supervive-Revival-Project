; DefaultEngine.ini — version fields captured from the SUPERVIVE client in
; session 5 (UEngine::Browse hook + Loki.log handshake init lines).
;
; Goal: make this server's StatelessConnect handshake checksum compute to
; the same 3716198887 value the client expects. UE derives NetworkChecksum
; from EngineNetworkVersion + GameNetworkVersion + ProjectVersion + some
; engine-internal CL/changelist numbers. We pin what we can via config; the
; rest is C++-side overrides we may need to add to module init code.

[/Script/EngineSettings.GeneralProjectSettings]
ProjectName=Loki
ProjectVersion=1.0.0.0
CompanyName=Theorycraft
CopyrightNotice=
Description=SUPERVIVE Revival stub server

[/Script/Engine.GameNetworkManager]
; UE's network manager uses GameNetworkVersion to gate version mismatches.
; Client reported GameNetworkVersion=0 in Loki.log, so we match here.
; (UE5's actual override field name may differ — verify against
; FNetworkVersion::GetLocalNetworkVersion at first compile.)

[/Script/OnlineSubsystemUtils.IpNetDriver]
; GameNetDriver class — same as the client's "NetDriverDefinition 'GameNetDriver'"
; in Loki.log. UE5 default IpNetDriver listens on UDP; we'll set the port
; via launch arg (-Port=7777) so the same binary can be repurposed later.

[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")

; Skip the cooked Global shader library — we're running uncooked Development
; content. First-launch attempt 2026-06-30 popped a "Missing game files" dialog
; complaining about ../../Content/'s Global shader library. UE only requires
; that library when bShareMaterialShaderCode=True; disabling here lets the
; server boot without cooked content. (For a server we don't render anyway.)
[CoreSystem.Settings]
bShareMaterialShaderCode=False
bSharedMaterialNativeLibraries=False

[/Script/Engine.RendererSettings]
r.ShaderPipelineCache.Enabled=False
r.ShaderPipelineCache.OpenPSOPrecompileToken=False
r.ShaderPipelineCache.LazyLoadShadersWhenPSOPrecompiling=0

[ShaderCodeLibrary]
bShareMaterialShaderCode=False

[OnlineSubsystem]
DefaultPlatformService=Null

[URL]
; UE constructs the default URL from these on Browse. We don't strictly
; need overrides here since the client will dial us — but documenting
; what the client sends helps future debugging.
;   Protocol: unreal
;   Host:     127.0.0.1
;   Port:     7777
;   Map:      LobbyV2/LVL_LobbyV2_Persistent (per session-5 capture)

; Session 10: MagicHeader override. The SUPERVIVE client prepends a stable
; first byte 0xBB to every handshake packet (captured via
; udp7777-listener.ps1). Need this CVar set so the server's
; StatelessConnectHandlerComponent::IncomingConnectionless can match the
; client's magic prefix instead of rejecting at "Error reading handshake
; packet" (parse fail before any version check).
;
; Bit-ordering math (verified empirically by the server's own log
; "Rejecting packet with invalid magic header 'X' vs 'Y'"):
;   - String "10111011" → uint32 0xDD (LSB of string is bit 0 of uint32)
;   - String "11011101" → uint32 0xBB (LSB of string is bit 0 of uint32)
;   - Captured packet byte 0 = 0xBB → string must be "11011101"
;
; This MUST be in [ConsoleVariables] (not -ExecCmds) because CVarNetMagicHeader
; is read by StatelessConnectHandlerComponent's constructor, which fires
; during engine init BEFORE -ExecCmds run.
[ConsoleVariables]
net.MagicHeader=11011101
net.VerifyMagicHeader=1
