; DefaultEngine.ini — version fields captured from the SUPERVIVE client in
; session 5 (UEngine::Browse hook + Loki.log handshake init lines).
;
; Goal: make this server's StatelessConnect handshake checksum compute to
; the same 3716198887 value the client expects. UE derives NetworkChecksum
; from EngineNetworkVersion + GameNetworkVersion + ProjectVersion + some
; engine-internal CL/changelist numbers. We pin what we can via config; the
; rest is C++-side overrides we may need to add to module init code.

[/Script/EngineSettings.GeneralProjectSettings]
ProjectName=Loki
ProjectVersion=1.0.0.0
CompanyName=Theorycraft
CopyrightNotice=
Description=SUPERVIVE Revival stub server

[/Script/Engine.GameNetworkManager]
; UE's network manager uses GameNetworkVersion to gate version mismatches.
; Client reported GameNetworkVersion=0 in Loki.log, so we match here.
; (UE5's actual override field name may differ — verify against
; FNetworkVersion::GetLocalNetworkVersion at first compile.)

[/Script/OnlineSubsystemUtils.IpNetDriver]
; GameNetDriver class — same as the client's "NetDriverDefinition 'GameNetDriver'"
; in Loki.log. UE5 default IpNetDriver listens on UDP; we'll set the port
; via launch arg (-Port=7777) so the same binary can be repurposed later.

[/Script/Engine.GameEngine]
+NetDriverDefinitions=(DefName="GameNetDriver",DriverClassName="/Script/OnlineSubsystemUtils.IpNetDriver",DriverClassNameFallback="/Script/OnlineSubsystemUtils.IpNetDriver")

[OnlineSubsystem]
DefaultPlatformService=Null

[URL]
; UE constructs the default URL from these on Browse. We don't strictly
; need overrides here since the client will dial us — but documenting
; what the client sends helps future debugging.
;   Protocol: unreal
;   Host:     127.0.0.1
;   Port:     7777
;   Map:      LobbyV2/LVL_LobbyV2_Persistent (per session-5 capture)
